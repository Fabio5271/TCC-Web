<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando...</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f8f9fa;
    }
    h1 {
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <h1>Redirecionando para o aplicativo...</h1>
  <p>Por favor, aguarde um momento.</p>

  <script>
    // Robust redirect for Angular SPA on GitHub Pages
    (function() {
      const repoName = '/TCC-Web';
      let path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;

      // Remove repo name from the beginning if present
      if (path.startsWith(repoName)) {
        path = path.substring(repoName.length);
      }

      // Clean the path
      if (path === '' || path === '/') {
        path = '/';
      }

      // Build the final URL
      const redirectUrl = repoName + path + search + hash;

      // Redirect to index.html with the full route
      window.location.replace(redirectUrl);
    })();
  </script>
</body>
</html>
